<!DOCTYPE html>
<html lang="en">
<head>
  <title>Car Rental - Sign Up</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  
  <link rel="stylesheet" type="text/css" href="css/reset.css">
  <link rel="stylesheet" type="text/css" href="css/main.css">
  <link rel="stylesheet" type="text/css" href="css/responsive.css">

  <script src="js/demo.js"></script>
  <style>
    header {
      background: rgba(28, 54, 85, 0.9) !important;
    }
    #fom {
      background: #f8fafc;
      padding: 40px;
      margin: 40px auto;
      max-width: 600px;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
    }
    .form-title {
      text-align: center;
      color: #1e3a8a;
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #475569;
      font-weight: bold;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }
    .btn-submit:hover {
      background: #1d4ed8;
    }
    .switch-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .switch-link a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>
    <div class="wrapper">
      <h1 class="logo"><a href="index.html" style="text-decoration:none; color:#fff;">Car Rental</a></h1>
      <a href="#" class="hamburger"></a>
      <nav id="navigation-menu">
        <!-- Rendered dynamically by demo.js -->
      </nav>
    </div>
  </header>

  <section class="hero" style="height: 200px;">
    <div class="caption" style="margin-top: -30px;">
      <h2 style="text-align: center; font-size: 50px;">Member Registration</h2>
    </div>
  </section>

  <div class="wrapper">
    <div id="fom">
      <div class="form-title">Create Client Account</div>
      
      <form id="signup-form">
        <div class="form-group">
          <label for="fname">Full Name:</label>
          <input type="text" id="fname" placeholder="Enter Full Name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address:</label>
          <input type="email" id="email" placeholder="Enter Email Address" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number:</label>
          <input type="tel" id="phone" placeholder="Enter Phone Number" required>
        </div>
        <div class="form-group">
          <label for="id_no">National ID Number:</label>
          <input type="number" id="id_no" placeholder="Enter ID Number" required>
        </div>
        <div class="form-group">
          <label for="location">Location:</label>
          <input type="text" id="location" placeholder="Enter Location" required>
        </div>
        <div class="form-group">
          <label for="gender">Gender:</label>
          <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <button type="submit" class="btn-submit">Submit Registration</button>
      </form>

      <div class="switch-link">
        Already have an account? <a href="login.html">Login Here</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="wrapper footer">
      <div class="copyrights">
        &copy; 2026 Car Rental Management System. Powered by GitHub Pages.
      </div>
    </div>
  </footer>

  <script>
    document.getElementById("signup-form").addEventListener("submit", (e) => {
      e.preventDefault();
      
      const email = document.getElementById("email").value.trim();
      const fname = document.getElementById("fname").value.trim();
      const phone = document.getElementById("phone").value;
      const id_no = document.getElementById("id_no").value;
      const locationVal = document.getElementById("location").value.trim();
      const gender = document.getElementById("gender").value;

      // Check if user already exists
      const bookings = JSON.parse(localStorage.getItem("cars_bookings")) || [];
      if (bookings.some(b => b.email.toLowerCase() === email.toLowerCase()) || email.toLowerCase() === "client@test.com") {
        alert("An account with this email address already exists.");
        return;
      }

      // Add a dummy entry to register
      const newClient = {
        client_id: Date.now(),
        fname,
        email,
        phone,
        id_no,
        location: locationVal,
        gender,
        car_id: null,
        status: "None",
        mpesa: ""
      };

      bookings.push(newClient);
      localStorage.setItem("cars_bookings", JSON.stringify(bookings));

      alert("Registration Successful! You can now log in.");
      window.location.href = `login.html?type=client&email=${encodeURIComponent(email)}`;
    });
  </script>
</body>
</html>
