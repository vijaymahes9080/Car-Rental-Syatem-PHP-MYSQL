<!DOCTYPE html>
<html lang="en">
<head>
  <title>Car Rental - Message Admin</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  
  <link rel="stylesheet" type="text/css" href="css/reset.css">
  <link rel="stylesheet" type="text/css" href="css/main.css">
  <link rel="stylesheet" type="text/css" href="css/responsive.css">

  <script src="js/demo.js"></script>
  <style>
    header {
      background: rgba(28, 54, 85, 0.9) !important;
    }
    #fom {
      background: #f8fafc;
      padding: 40px;
      margin: 40px auto;
      max-width: 600px;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
    }
    .form-title {
      text-align: center;
      color: #1e3a8a;
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #475569;
      font-weight: bold;
    }
    .form-group textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      box-sizing: border-box;
      resize: vertical;
      font-family: inherit;
    }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
    .btn-submit:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <header>
    <div class="wrapper">
      <h1 class="logo"><a href="index.html" style="text-decoration:none; color:#fff;">Car Rental</a></h1>
      <a href="#" class="hamburger"></a>
      <nav id="navigation-menu">
        <!-- Rendered dynamically by demo.js -->
      </nav>
    </div>
  </header>

  <section class="hero" style="height: 200px;">
    <div class="caption" style="margin-top: -30px;">
      <h2 style="text-align: center; font-size: 50px;">Contact Administration</h2>
    </div>
  </section>

  <div class="wrapper">
    <div id="fom">
      <div class="form-title">Send a Message to Admin</div>
      <form id="message-form">
        <div class="form-group">
          <label for="msg-text">Your Inquiry / Message:</label>
          <textarea id="msg-text" placeholder="Type your message here..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">Send Message</button>
      </form>
    </div>
  </div>

  <footer>
    <div class="wrapper footer">
      <div class="copyrights">
        &copy; 2026 Car Rental Management System. Powered by GitHub Pages.
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const session = Session.get();
      if (!session) {
        alert("Please login first to send a message.");
        window.location.href = "login.html";
        return;
      }

      const form = document.getElementById("message-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = document.getElementById("msg-text").value.trim();

        const messages = JSON.parse(localStorage.getItem("cars_messages")) || [];
        messages.push({
          msg_id: Date.now(),
          email: session.email,
          message: text,
          status: "Unread",
          time: new Date().toLocaleString()
        });
        localStorage.setItem("cars_messages", JSON.stringify(messages));

        alert("Message successfully sent to the admin dashboard!");
        document.getElementById("msg-text").value = "";
      });
    });
  </script>
</body>
</html>
